<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros de Eventos Guardados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Elementos decorativos de fondo */
        .background-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .grid-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(59, 130, 246, 0.05) 25%, rgba(59, 130, 246, 0.05) 26%, transparent 27%, transparent 74%, rgba(59, 130, 246, 0.05) 75%, rgba(59, 130, 246, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(59, 130, 246, 0.05) 25%, rgba(59, 130, 246, 0.05) 26%, transparent 27%, transparent 74%, rgba(59, 130, 246, 0.05) 75%, rgba(59, 130, 246, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            opacity: 0.3;
        }

        .accent-glow {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            filter: blur(80px);
            opacity: 0.1;
        }

        .glow-1 {
            width: 300px;
            height: 300px;
            background: #3b82f6;
            top: 10%;
            right: 10%;
        }

        .glow-2 {
            width: 250px;
            height: 250px;
            background: #06b6d4;
            bottom: 15%;
            left: 5%;
        }

        /* Layout principal */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            border-bottom: 1px solid rgba(71, 85, 105, 0.5);
            backdrop-filter: blur(10px);
            padding: 2rem 1.5rem;
            background: rgba(15, 23, 42, 0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-text h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header-text p {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-refresh:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .btn-refresh:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-refresh:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner-small {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
            width: 100%;
        }

        /* Controles */
        .controls-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            background: rgba(71, 85, 105, 0.3);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .search-box::placeholder {
            color: #64748b;
        }

        .search-box:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(71, 85, 105, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .records-count {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Tabla */
        .table-wrapper {
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        thead {
            background: rgba(51, 65, 85, 0.5);
            border-bottom: 2px solid rgba(71, 85, 105, 0.5);
        }

        th {
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #cbd5e1;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            transition: all 0.2s;
            animation: slideInRow 0.4s ease-out;
        }

        @keyframes slideInRow {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        tbody tr:hover {
            background: rgba(71, 85, 105, 0.1);
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        td {
            padding: 1rem;
            color: #e2e8f0;
        }

        td.text-muted {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        td.id-cell {
            font-family: 'Courier New', monospace;
            color: #60a5fa;
            font-weight: 600;
        }

        td.truncate {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        td.datetime-cell {
            font-size: 0.875rem;
            color: #cbd5e1;
        }

        td.geo-cell {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #60a5fa;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Estados */
        .empty-state {
            text-align: center;
            padding: 4rem 1.5rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            margin-bottom: 1.5rem;
        }

        /* Loading state */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
        }

        .spinner-large {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        .loading-text {
            color: #94a3b8;
        }

        /* Error state */
        .error-message {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 0.5rem;
            color: #fca5a5;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .image-preview {
            width: 40px;
            height: 40px;
            border-radius: 0.5rem;
            background: rgba(71, 85, 105, 0.3);
            border: 1px solid rgba(71, 85, 105, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.25rem;
        }

        .image-preview:hover {
            background: rgba(71, 85, 105, 0.5);
            border-color: rgba(59, 130, 246, 0.5);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            margin: 10% auto;
            padding: 2rem;
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 1rem;
            max-width: 500px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.5rem;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #e2e8f0;
        }

        .modal-image {
            width: 100%;
            max-height: 400px;
            border-radius: 0.5rem;
            object-fit: contain;
            background: rgba(51, 65, 85, 0.3);
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-text h1 {
                font-size: 1.875rem;
            }

            .header-actions {
                width: 100%;
            }

            .btn-refresh {
                width: 100%;
                justify-content: center;
            }

            .controls-bar {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
                flex: none;
            }

            .table-responsive {
                font-size: 0.85rem;
            }

            th, td {
                padding: 0.75rem 0.5rem;
            }

            td.truncate {
                max-width: 150px;
            }

            .modal-content {
                margin: 20% auto;
                max-width: 90%;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="background-decoration">
    <div class="grid-pattern"></div>
    <div class="accent-glow glow-1"></div>
    <div class="accent-glow glow-2"></div>
</div>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="header-text">
                <h1>📋 Registros de Eventos</h1>
                <p>Visualización de todos los eventos guardados en el sistema</p>
            </div>
            <div class="header-actions">
                <button class="btn-refresh" id="btnRefresh">
                    <span>🔄</span>
                    <span id="refreshText">Actualizar</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Error Message -->
        <div id="errorMessage"></div>

        <!-- Controls Bar -->
        <div class="controls-bar">
            <input
                    type="text"
                    class="search-box"
                    id="searchBox"
                    placeholder="Buscar por usuario, descripción, localidad, tipo, lat o lng..."
            />
            <span class="records-count">
                    Registros: <span id="recordsCount">0</span>
                </span>
        </div>

        <!-- Table Container -->
        <div class="table-wrapper">
            <div id="tableContainer"></div>
        </div>
    </div>
</div>

<!-- Image Modal -->
<div id="imageModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Vista de Imagen</h2>
            <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <img id="modalImage" class="modal-image" src="" alt="Evento">
    </div>
</div>

<script src="guard_event.js"></script>
</body>
</html>
