<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Localidades</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a1428 0%, #0d1b2a 50%, #1a2a3a 100%);
            color: #e0e6ed;
            overflow-x: hidden;
        }

        /* Elementos decorativos de fondo */
        .background-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .geo-grid {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 1px solid rgba(34, 197, 94, 0.1);
            border-radius: 50%;
            opacity: 0.3;
        }

        .geo-grid-1 {
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            animation: float 20s ease-in-out infinite;
        }

        .geo-grid-2 {
            bottom: -150px;
            left: -150px;
            width: 600px;
            height: 600px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, -30px) rotate(180deg); }
        }

        .accent-blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            filter: blur(60px);
            opacity: 0.15;
        }

        .accent-1 {
            width: 300px;
            height: 300px;
            background: #22c55e;
            top: 20%;
            left: 10%;
            animation: pulse 8s ease-in-out infinite;
        }

        .accent-2 {
            width: 250px;
            height: 250px;
            background: #06b6d4;
            bottom: 20%;
            right: 10%;
            animation: pulse 10s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Layout principal */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            border-bottom: 1px solid rgba(34, 197, 94, 0.2);
            backdrop-filter: blur(10px);
            padding: 2rem 1.5rem;
            background: rgba(10, 20, 40, 0.3);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-text h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #22c55e 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .header-icon {
            font-size: 2rem;
            margin-right: 0.5rem;
        }

        .btn-new {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
            white-space: nowrap;
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.4);
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
        }

        .btn-new:active {
            transform: translateY(0);
        }

        /* Main content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
            width: 100%;
        }

        /* Form */
        .form-container {
            margin-bottom: 2rem;
            animation: slideInDown 0.3s ease-out;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            background: rgba(13, 27, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .form-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e0e6ed;
        }

        .btn-close {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1.5rem;
        }

        .btn-close:hover {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-radius: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.75rem;
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(51, 65, 85, 0.3);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input[type="text"]::placeholder {
            color: #64748b;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #22c55e;
            background: rgba(51, 65, 85, 0.5);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .error-message {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 0.5rem;
            color: #fca5a5;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .form-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-submit,
        .btn-cancel {
            flex: 1;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-cancel {
            background: rgba(71, 85, 105, 0.3);
            color: #cbd5e1;
        }

        .btn-cancel:hover {
            background: rgba(71, 85, 105, 0.5);
        }

        /* Grid de localidades */
        .localities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .locality-card {
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s;
            animation: slideInUp 0.4s ease-out;
            position: relative;
            overflow: hidden;
        }

        .locality-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #22c55e, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .locality-card:hover::before {
            opacity: 1;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .locality-card:hover {
            border-color: rgba(34, 197, 94, 0.4);
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.1);
            background: rgba(13, 27, 42, 0.6);
            transform: translateY(-2px);
        }

        .locality-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .locality-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #e0e6ed;
            margin-bottom: 0.25rem;
            word-break: break-word;
        }

        .locality-country {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .country-flag {
            font-size: 1.25rem;
        }

        .locality-id {
            color: #64748b;
            font-size: 0.75rem;
            font-family: 'Courier New', monospace;
            background: rgba(34, 197, 94, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .locality-buttons {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
            max-height: 0;
            overflow: hidden;
        }

        .locality-card:hover .locality-buttons {
            opacity: 1;
            max-height: 100px;
        }

        .btn-edit,
        .btn-delete {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }

        .btn-edit {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .btn-edit:hover {
            background: rgba(34, 197, 94, 0.3);
            color: #bbf7d0;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #fecaca;
        }

        /* Estados vacíos */
        .empty-state {
            text-align: center;
            padding: 4rem 1.5rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            margin-bottom: 1.5rem;
        }

        .empty-state .btn-new {
            margin: 0 auto;
        }

        /* Loading state */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(34, 197, 94, 0.2);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-text h1 {
                font-size: 1.875rem;
            }

            .btn-new {
                width: 100%;
                justify-content: center;
            }

            .localities-grid {
                grid-template-columns: 1fr;
            }

            .form-buttons {
                flex-direction: column;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .btn-submit,
            .btn-cancel {
                width: 100%;
            }

            .locality-card:hover .locality-buttons {
                position: static;
                opacity: 1;
                max-height: 100%;
                margin-top: 1rem;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
<div class="background-decoration">
    <div class="geo-grid geo-grid-1"></div>
    <div class="geo-grid geo-grid-2"></div>
    <div class="accent-blob accent-1"></div>
    <div class="accent-blob accent-2"></div>
</div>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="header-text">
                <h1><span class="header-icon">🌍</span>Gestión de Localidades</h1>
                <p>Administra ciudades y países del sistema</p>
            </div>
            <button class="btn-new" id="btnNewLocality">
                <span>➕</span>
                <span>Nueva Localidad</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Form Container (hidden by default) -->
        <div class="form-container" id="formContainer" style="display: none;">
            <div class="form-card">
                <div class="form-header">
                    <h2 id="formTitle">Crear Nueva Localidad</h2>
                    <button class="btn-close" id="btnCloseForm">✕</button>
                </div>

                <form id="localityForm">
                    <div id="errorMessage"></div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombreLocalidad">Nombre de la Localidad</label>
                            <input
                                    type="text"
                                    id="nombreLocalidad"
                                    placeholder="Ej: Montevideo, Buenos Aires..."
                                    required
                            />
                        </div>

                        <div class="form-group">
                            <label for="paisLocalidad">País</label>
                            <input
                                    type="text"
                                    id="paisLocalidad"
                                    placeholder="Ej: Uruguay, Argentina..."
                                    required
                            />
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-submit" id="btnSubmit">
                            <span>✓</span>
                            <span id="submitText">Crear</span>
                        </button>
                        <button type="button" class="btn-cancel" id="btnCancel">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Localities Container -->
        <div id="localitiesContainer"></div>
    </div>
</div>

<script src="localidad.js"></script>
</body>
</html>
