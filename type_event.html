<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tipos de Eventos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Elementos decorativos de fondo */
        .background-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: multiply;
            filter: blur(80px);
            opacity: 0.2;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            top: 0;
            right: 0;
            animation: blob-animation 7s infinite;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #a855f7;
            bottom: 0;
            left: 0;
            animation: blob-animation 7s infinite 2s;
        }

        @keyframes blob-animation {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Layout principal */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            border-bottom: 1px solid rgba(71, 85, 105, 0.5);
            backdrop-filter: blur(10px);
            padding: 2rem 1.5rem;
            margin-bottom: 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-text h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header-text p {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .btn-new {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            white-space: nowrap;
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .btn-new:active {
            transform: translateY(0);
        }

        /* Main content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
            width: 100%;
        }

        /* Form */
        .form-container {
            margin-bottom: 2rem;
            animation: slideInDown 0.3s ease-out;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .form-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .btn-close {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-close:hover {
            background: rgba(71, 85, 105, 0.3);
            color: #e2e8f0;
            border-radius: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.75rem;
        }

        .form-group input[type="text"],
        .form-group input[type="range"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(71, 85, 105, 0.3);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input[type="text"]::placeholder {
            color: #64748b;
        }

        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(71, 85, 105, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input[type="range"] {
            padding: 0;
            height: 0.5rem;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #64748b;
        }

        .importance-value {
            color: #60a5fa;
            font-weight: 600;
        }

        .error-message {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 0.5rem;
            color: #fca5a5;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .form-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-submit,
        .btn-cancel {
            flex: 1;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-cancel {
            background: rgba(71, 85, 105, 0.3);
            color: #cbd5e1;
        }

        .btn-cancel:hover {
            background: rgba(71, 85, 105, 0.5);
        }

        /* Grid de eventos */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .event-card {
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s;
            animation: slideInUp 0.4s ease-out;
            group: true;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-card:hover {
            border-color: rgba(71, 85, 105, 0.7);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            background: rgba(30, 41, 59, 0.5);
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .event-title {
            flex: 1;
        }

        .event-title h3 {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            word-break: break-word;
        }

        .event-id {
            color: #64748b;
            font-size: 0.875rem;
        }

        .event-id code {
            color: #60a5fa;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .importance-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid;
            margin-bottom: 1rem;
        }

        .importance-low {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .importance-medium {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .importance-high {
            background: rgba(251, 146, 60, 0.1);
            border-color: rgba(251, 146, 60, 0.3);
            color: #fed7aa;
        }

        .importance-critical {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .progress-bar {
            width: 100%;
            height: 0.5rem;
            background: rgba(71, 85, 105, 0.3);
            border-radius: 9999px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: all 0.3s;
        }

        .progress-low { background: #10b981; }
        .progress-medium { background: #3b82f6; }
        .progress-high { background: #fb923c; }
        .progress-critical { background: #ef4444; }

        .event-buttons {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
            max-height: 0;
            overflow: hidden;
        }

        .event-card:hover .event-buttons {
            opacity: 1;
            max-height: 100px;
        }

        .btn-edit,
        .btn-delete {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
            color: #bfdbfe;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #fecaca;
        }

        /* Estados vacíos */
        .empty-state {
            text-align: center;
            padding: 4rem 1.5rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            margin-bottom: 1.5rem;
        }

        .empty-state .btn-new {
            margin: 0 auto;
        }

        /* Loading state */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.5rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-text h1 {
                font-size: 1.875rem;
            }

            .btn-new {
                width: 100%;
                justify-content: center;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }

            .form-buttons {
                flex-direction: column;
            }

            .btn-submit,
            .btn-cancel {
                width: 100%;
            }

            .event-card:hover .event-buttons {
                position: absolute;
                opacity: 1;
                max-height: 100%;
                bottom: 1.5rem;
                left: 1.5rem;
                right: 1.5rem;
                width: calc(100% - 3rem);
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
<div class="background-decoration">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="header-text">
                <h1>Gestión de Eventos</h1>
                <p>Administra los tipos y niveles de eventos del sistema</p>
            </div>
            <button class="btn-new" id="btnNewEvent">
                <span>➕</span>
                <span>Nuevo Evento</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Form Container (hidden by default) -->
        <div class="form-container" id="formContainer" style="display: none;">
            <div class="form-card">
                <div class="form-header">
                    <h2 id="formTitle">Crear Nuevo Evento</h2>
                    <button class="btn-close" id="btnCloseForm">✕</button>
                </div>

                <form id="eventForm">
                    <div id="errorMessage"></div>

                    <div class="form-group">
                        <label for="nombreEvento">Nombre del Evento</label>
                        <input
                                type="text"
                                id="nombreEvento"
                                placeholder="Ej: Emergencia, Advertencia..."
                                required
                        />
                    </div>

                    <div class="form-group">
                        <label for="importancia">
                            Nivel de Importancia:
                            <span class="importance-value" id="importanciaValue">5</span>
                        </label>
                        <input
                                type="range"
                                id="importancia"
                                min="1"
                                max="10"
                                value="5"
                        />
                        <div class="range-labels">
                            <span>Baja</span>
                            <span>Alta</span>
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-submit" id="btnSubmit">
                            <span>✓</span>
                            <span id="submitText">Crear</span>
                        </button>
                        <button type="button" class="btn-cancel" id="btnCancel">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Events Container -->
        <div id="eventsContainer"></div>
    </div>
</div>

<script src="type_event.js"></script>
</body>
</html>
